<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Audio Downloader</title>
    <script>
        async function downloadAudio() {
            const urlInput = document.getElementById('url').value;
            const loadingMessage = document.getElementById('loading');
            const errorMessage = document.getElementById('error');
            const downloadLink = document.getElementById('download-link');
            errorMessage.textContent = '';
            loadingMessage.textContent = 'Loading...';
            downloadLink.style.display = 'none';

            try {
                const response = await fetch('https://your-flask-backend/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: urlInput })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }

                const data = await response.json();
                if (data.success) {
                    downloadLink.href = data.downloadUrl;
                    downloadLink.textContent = 'Click here to download your audio';
                    downloadLink.style.display = 'block';
                } else {
                    throw new Error(data.message || 'Failed to download audio');
                }
            } catch (error) {
                errorMessage.textContent = 'Error: ' + error.message;
            } finally {
                loadingMessage.textContent = '';
            }
        }
    </script>
</head>
<body>
    <h1>YouTube Audio Downloader</h1>
    <input type="text" id="url" placeholder="Enter YouTube video URL">
    <button onclick="downloadAudio()">Download Audio</button>
    <p id="loading"></p>
    <p id="error" style="color: red;"></p>
    <a id="download-link" style="display: none;" download>Click here to download your audio</a>
</body>
</html>
