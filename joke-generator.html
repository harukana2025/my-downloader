<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .joke-text {
            color: #333;
            font-size: 1.1em;
            line-height: 1.6;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .joke-type {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
        }
        .stats {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }
        .api-info {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <div id="error" class="error" style="display: none;"></div>
        <div class="joke-box">
            <div id="jokeContent" class="joke-text">
                Click the button to get a random joke!
            </div>
        </div>
        <div class="button-group">
            <button onclick="getRandomJoke()">Get Joke</button>
            <button onclick="getJokeByType('programming')">Programming</button>
            <button onclick="getJokeByType('knock-knock')">Knock Knock</button>
            <button onclick="shareJoke()">Share</button>
        </div>
        <div id="jokeType" class="joke-type"></div>
        <div id="stats" class="stats"></div>
        <div class="api-info">
            Powered by Official Joke API
        </div>
    </div>
    <script>
        let currentJoke = '';
        let jokeCount = 0;
        let apiCallsToday = 0;
        async function getRandomJoke() {
            try {
                showLoading();
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }
                const data = await response.json();
                displayJoke(data);
                jokeCount++;
                updateStats();
            } catch (error) {
                showError('Oops! Could not fetch a joke. Please try again.');
                console.error('Error:', error);
            }
        }
        async function getJokeByType(type) {
            try {
                showLoading();
                const response = await fetch(`https://official-joke-api.appspot.com/jokes/${type}/random`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${type} joke`);
                }
                const data = Array.isArray(response) ? response[0] : await response.json();
                displayJoke(data);
                jokeCount++;
                updateStats();
            } catch (error) {
                showError(`Oops! Could not fetch a ${type} joke. Please try again.`);
                console.error('Error:', error);
            }
        }
        function displayJoke(jokeData) {
            const jokeTextDiv = document.getElementById('jokeContent');
            const jokeTypeDiv = document.getElementById('jokeType');
            const joke = Array.isArray(jokeData) ? jokeData[0] : jokeData;
            let jokeText = '';
            if (joke.type === 'knock-knock') {
                jokeText = `${joke.setup}<br><br>${joke.delivery}`;
                currentJoke = `${joke.setup} ${joke.delivery}`;
            } else {
                jokeText = `<strong>Q:</strong> ${joke.setup}<br><br><strong>A:</strong> ${joke.punchline}`;
                currentJoke = `Q: ${joke.setup} A: ${joke.punchline}`;
            }
            jokeTextDiv.innerHTML = jokeText;
            jokeTypeDiv.innerHTML = `<strong>Type:</strong> ${joke.type.replace('-', ' ').toUpperCase()}`;
            document.getElementById('error').style.display = 'none';
            jokeTextDiv.style.animation = 'none';
            setTimeout(() => {
                jokeTextDiv.style.animation = 'slideIn 0.5s ease-out';
            }, 10);
        }
        function showLoading() {
            const jokeTextDiv = document.getElementById('jokeContent');
            jokeTextDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading a funny joke...</p></div>';
            document.getElementById('error').style.display = 'none';
        }
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            const jokeTextDiv = document.getElementById('jokeContent');
            jokeTextDiv.innerHTML = 'Click the button to get a joke!';
        }
        function updateStats() {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `Jokes fetched today: <strong>${jokeCount}</strong>`;
        }
        function shareJoke() {
            if (!currentJoke) {
                alert('Get a joke first!');
                return;
            }
            const text = `Check this out: ${currentJoke}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Funny Joke',
                    text: text
                }).catch(err => console.log('Share failed:', err));
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Joke copied to clipboard!');
                }).catch(() => {
                    prompt('Copy this joke:', text);
                });
            }
        }
        window.addEventListener('load', () => {
            getRandomJoke();
        });
    </script>
</body>
</html>
